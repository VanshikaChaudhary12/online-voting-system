version: "1"
services:
  - type: web
    name: voting-system-backend
    env: java
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: java -jar backend/target/online-voting-system-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_OPTS
        value: -Xmx512m
      - key: SERVER_PORT
        value: 8082
